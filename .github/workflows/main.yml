name: Cypress Tests

on:
  push:
    branches: [master, main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Executar Cypress
        uses: cypress-io/github-action@v6
